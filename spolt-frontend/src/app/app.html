@if (showGlobalLayout) {
  <app-header class="theme-dark"></app-header>
}

<router-outlet></router-outlet>

@if (showGlobalLayout) {
  <app-footer class="theme-dark"></app-footer>
}

@if (geoService.showPermissionDialog()) {
  <app-geo-permission-dialog
    (onAccept)="geoService.handlePermissionChoice(true)"
    (onDecline)="geoService.handlePermissionChoice(false)"
  ></app-geo-permission-dialog>
}
