<div class="modal-backdrop" (click)="cerrar.emit()">
  <div class="edit-form-card" (click)="$event.stopPropagation()">
    <div class="card-corner card-corner-tl"></div>
    <div class="card-corner card-corner-br"></div>

    <div class="form-header">
      <h3 class="form-title">📝 EDITAR DATOS</h3>
      <button class="close-btn" (click)="cerrar.emit()">✕</button>
    </div>

    <form [formGroup]="datosForm" (ngSubmit)="submit()">
      <div class="form-group">
        <label class="form-label">> NOMBRE COMPLETO_</label>
        <input type="text" class="form-input" placeholder="TU NOMBRE COMPLETO" formControlName="nombre_completo" />
      </div>

      <div class="form-group">
        <label class="form-label">> BIOGRAFÍA_</label>
        <textarea class="form-input form-textarea" placeholder="CUÉNTANOS SOBRE TI..." formControlName="biografia"
          rows="4"></textarea>
      </div>

      <div class="form-group">
        <label class="form-label">> FECHA DE NACIMIENTO_</label>
        <input type="date" class="form-input" formControlName="fecha_nacimiento" />
      </div>

      @if (serverError) {
      <div class="form-error server-error">* {{ serverError }}</div>
      }

      @if (successMsg) {
      <div class="form-success">✓ {{ successMsg }}</div>
      }

      <button type="submit" class="submit-btn" [disabled]="datosForm.invalid || loading">
        <span>
          @if (loading) {
          GUARDANDO...
          } @else {
          GUARDAR DATOS
          }
        </span>
      </button>
    </form>
  </div>
</div>
