<div class="app-layout">
  <app-sidebar></app-sidebar>

  <div class="main-content">
    <app-header-aplicarion pageName="EVENTOS"></app-header-aplicarion>

    <main class="page-content">
      <div class="content-wrapper">
        <div class="header-actions" [class.is-active]="vistaActiva() !== 'inicio'">
          <div class="title-box">
            <h1>
              @switch (vistaActiva()) {
                @case ('inicio')      { EVENTOS DEPORTIVOS }
                @case ('unirse')      { UNIRSE A EVENTOS }
                @case ('crear')       { CREAR EVENTO }
                @case ('mis-eventos') { MIS EVENTOS }
              }
            </h1>
          </div>
          @if (vistaActiva() !== 'inicio') {
            <button class="btn-volver" (click)="volverAlMenu()">
              <span class="btn-text-desktop">VOLVER AL MENÚ</span>
            </button>
          }
        </div>

        <router-outlet></router-outlet>
      </div>
    </main>
  </div>
</div>
