<div class="container">
    @for (event of listEvents(); track event.id_evento || event.id) {
        <app-card-event [id]="'evento-' + (event.id_evento || event.id)" [evento]="event" [isJoined]="joinedEventsId().includes(event.id_evento || event.id || 0)" [isOwner]="isOwner()" (out_Id_Event)="sendIdEvent($event)"></app-card-event>
    }
</div>
