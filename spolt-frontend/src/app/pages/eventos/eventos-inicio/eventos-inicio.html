<div class="menu-principal-grid">

      <div class="btn-icon">
        <img src="eventos/iconos/Unirse.png" alt="Unirse">

    </div>
    <div class="btn-texts">

  <button class="btn-menu" (click)="ir('crear')">

  <!-- Botón Mis Eventos -->
  <button class="btn-menu" (click)="ir('mis-eventos')">
    <div class="btn-image-container">

        <img src="eventos/iconos/MisEventos.png" alt="Mis Eventos">
