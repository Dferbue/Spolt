<div class="page-container">
  <div class="page-header">
    <h1 class="glitch" data-text="CREAR CUENTA">CREAR CUENTA</h1>
  </div>
  
  <div class="component-wrapper">
    @if (registroExitoso()) {
      <div class="success-message-container" style="background: #ffffff; border: 4px solid #111; padding: 40px; text-align: center; border-radius: 12px; box-shadow: 8px 8px 0px #ff006e; max-width: 500px; margin: 0 auto;">
        <div style="font-size: 3rem; margin-bottom: 20px;">📧</div>
        <h2 style="font-size: 1.8rem; font-weight: 900; margin-bottom: 15px; color: #111;">¡Ya casi estás!</h2>
        <p style="font-size: 1.1rem; font-weight: 600; color: #555; margin-bottom: 30px; line-height: 1.5;">
          Te hemos enviado un correo de confirmación. Revisa tu bandeja de entrada y haz clic en el enlace para activar tu cuenta.
        </p>
        <button style="background: #111; color: #fff; border: 3px solid #111; padding: 12px 24px; font-weight: 900; font-size: 1rem; cursor: pointer; transition: all 0.2s;" routerLink="/login">IR AL LOGIN</button>
      </div>
    } @else {
      <app-register 
        (sendRegister)="register($event)" 
        [loading]="loading()"
        [serverError]="errorMessage">
      </app-register>
    }
  </div>
</div>
